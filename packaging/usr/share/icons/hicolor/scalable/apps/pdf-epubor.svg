<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Fond arrondi bleu foncé -->
  <rect width="64" height="64" rx="10" fill="#2c5282"/>

  <!-- Livre gauche (PDF) -->
  <rect x="6" y="10" width="22" height="32" rx="2" fill="#ebf4ff"/>
  <rect x="6" y="10" width="4"  height="32" fill="#bee3f8"/>
  <text x="17" y="22" font-size="5.5" text-anchor="middle"
        fill="#2c5282" font-family="sans-serif" font-weight="bold">PDF</text>
  <line x1="11" y1="26" x2="26" y2="26" stroke="#90cdf4" stroke-width="1"/>
  <line x1="11" y1="29" x2="26" y2="29" stroke="#90cdf4" stroke-width="1"/>
  <line x1="11" y1="32" x2="22" y2="32" stroke="#90cdf4" stroke-width="1"/>
  <line x1="11" y1="35" x2="26" y2="35" stroke="#90cdf4" stroke-width="1"/>

  <!-- Flèche centrale -->
  <text x="32" y="33" font-size="10" text-anchor="middle"
        fill="#f6ad55" font-family="sans-serif" font-weight="bold">→</text>

  <!-- Livre droit (EPUB) -->
  <rect x="36" y="10" width="22" height="32" rx="2" fill="#c6f6d5"/>
  <rect x="54" y="10" width="4"  height="32" fill="#9ae6b4"/>
  <text x="47" y="22" font-size="5" text-anchor="middle"
        fill="#276749" font-family="sans-serif" font-weight="bold">EPUB3</text>
  <line x1="38" y1="26" x2="53" y2="26" stroke="#68d391" stroke-width="1"/>
  <line x1="38" y1="29" x2="53" y2="29" stroke="#68d391" stroke-width="1"/>
  <line x1="38" y1="32" x2="49" y2="32" stroke="#68d391" stroke-width="1"/>
  <line x1="38" y1="35" x2="53" y2="35" stroke="#68d391" stroke-width="1"/>

  <!-- Étiquette bas -->
  <rect x="8" y="48" width="48" height="11" rx="3" fill="#1a365d"/>
  <text x="32" y="57" font-size="7" text-anchor="middle"
        fill="#90cdf4" font-family="sans-serif" font-weight="bold"
        letter-spacing="1">PDF-EPUBOR</text>
</svg>
